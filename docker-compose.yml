version: "3.9"

# ─────────────────────────────────────────────────────────────
# SupportForge — Full Production Stack
# Services: postgres+pgvector, redis, backend, agent-worker,
#            frontend, prometheus, grafana, libretranslate
# ─────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-supportforge}:${POSTGRES_PASSWORD:-supportforge_dev}@postgres:5432/${POSTGRES_DB:-supportforge}
  REDIS_URL: redis://redis:6379/0
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-supportforge}
  SECRET_KEY: ${SECRET_KEY:-change_me_in_production_min_32_chars}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LIBRETRANSLATE_URL: http://libretranslate:5000
  MAX_CONCURRENT_AGENT_EXECUTIONS: ${MAX_CONCURRENT_AGENT_EXECUTIONS:-20}
  MAX_STEPS_PER_TICKET: 10
  MAX_LATENCY_SECONDS: 10
  MAX_KB_RETRIES: 3
  MAX_LLM_CALLS_PER_TICKET: 5
  MAX_TOKENS_PER_TICKET: 5000

services:
  # ── PostgreSQL 16 + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supportforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supportforge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-supportforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supportforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sf_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sf_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./backend/data:/app/data:ro

  # ── ARQ Agent Worker (2 replicas) ─────────────────────────
  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: python -m arq app.workers.agent_worker.WorkerSettings
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    volumes:
      - ./backend/data:/app/data:ro

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sf_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── LibreTranslate (Hindi ↔ English) ─────────────────────
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: sf_translate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: en,hi
      LT_DISABLE_WEB_UI: "true"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sf_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sf_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
